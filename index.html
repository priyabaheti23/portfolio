<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Priya Baheti — Product Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=Inter&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; margin:0; background:#fafaf8; }

/* KEEPING YOUR STYLES SAME (trimmed for clarity) */
.post-card { display:grid; grid-template-columns:1fr 1fr; margin:30px; border:1px solid #ddd; }
.slide-img { width:100%; height:350px; object-fit:cover; }
.slides-panel { position:relative; overflow:hidden; }
.slides-track { display:flex; transition:0.4s; }
.slides-arrow {
  position:absolute; top:50%; transform:translateY(-50%);
  background:black; color:white; border:none; padding:8px; cursor:pointer;
}
.prev { left:10px; }
.next { right:10px; }

.card-content { padding:20px; }
</style>
</head>

<body>

<h1 style="padding:20px;">Priya Baheti — Portfolio</h1>

<!-- ================= RAPIDO ================= -->
<div class="post-card">
  <div class="slides-panel">
    <div class="slides-track" id="sl-rapido">

      <img class="slide-img" src="images/10.png">
      <img class="slide-img" src="images/rapido/2.png">
      <img class="slide-img" src="images/rapido/3.png">

    </div>

    <button class="slides-arrow prev" onclick="moveSlide('rapido', -1)">‹</button>
    <button class="slides-arrow next" onclick="moveSlide('rapido', 1)">›</button>
  </div>

  <div class="card-content">
    <h2>Rapido</h2>
    <p>Reducing ride cancellations with smarter driver matching.</p>
  </div>
</div>

<!-- ================= SWIGGY ================= -->
<div class="post-card">
  <div class="slides-panel">
    <div class="slides-track" id="sl-swiggy">

      <img class="slide-img" src="images/swiggy/1.png">
      <img class="slide-img" src="images/swiggy/2.png">
      <img class="slide-img" src="images/swiggy/3.png">

    </div>

    <button class="slides-arrow prev" onclick="moveSlide('swiggy', -1)">‹</button>
    <button class="slides-arrow next" onclick="moveSlide('swiggy', 1)">›</button>
  </div>

  <div class="card-content">
    <h2>Swiggy</h2>
    <p>Improving food discovery and reducing decision fatigue.</p>
  </div>
</div>

<!-- ================= ZOMATO ================= -->
<div class="post-card">
  <div class="slides-panel">
    <div class="slides-track" id="sl-zomato">

      <img class="slide-img" src="images/zomato/1.png">
      <img class="slide-img" src="images/zomato/2.png">
      <img class="slide-img" src="images/zomato/3.png">

    </div>

    <button class="slides-arrow prev" onclick="moveSlide('zomato', -1)">‹</button>
    <button class="slides-arrow next" onclick="moveSlide('zomato', 1)">›</button>
  </div>

  <div class="card-content">
    <h2>Zomato</h2>
    <p>Enhancing restaurant selection with better filters.</p>
  </div>
</div>

<!-- ================= SCRIPT ================= -->
<script>
let slideIndex = {
  rapido: 0,
  swiggy: 0,
  zomato: 0
};

function moveSlide(id, direction) {
  const track = document.getElementById("sl-" + id);
  const slides = track.children;

  slideIndex[id] += direction;

  if (slideIndex[id] < 0) slideIndex[id] = slides.length - 1;
  if (slideIndex[id] >= slides.length) slideIndex[id] = 0;

  track.style.transform = "translateX(-" + (slideIndex[id] * 100) + "%)";
}
</script>

</body>
</html>
